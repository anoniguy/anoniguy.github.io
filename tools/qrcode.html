<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="url"],
        input[type="email"],
        input[type="tel"],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #0f3460;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .type-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .type-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .type-btn:hover {
            border-color: #0f3460;
        }

        .type-btn.active {
            background: #0f3460;
            color: white;
            border-color: #0f3460;
        }

        button.generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
        }

        button.generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(15, 52, 96, 0.4);
        }

        button.generate-btn:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            text-align: center;
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #qrcode {
            display: inline-block;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        #qrcode canvas {
            display: block;
        }

        .download-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .download-btn:hover {
            background: #d63850;
            transform: scale(1.05);
        }

        .input-fields {
            display: none;
        }

        .input-fields.active {
            display: block;
        }

        .helper-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔳 QR Code Generator</h1>
        <p class="subtitle">Generate QR codes for any content type</p>

        <div class="type-selector">
            <button class="type-btn active" data-type="url">URL</button>
            <button class="type-btn" data-type="text">Text</button>
            <button class="type-btn" data-type="email">Email</button>
            <button class="type-btn" data-type="phone">Phone</button>
            <button class="type-btn" data-type="sms">SMS</button>
            <button class="type-btn" data-type="wifi">WiFi</button>
            <button class="type-btn" data-type="vcard">vCard</button>
        </div>

        <div class="form-group">
            <div id="field-url" class="input-fields active">
                <label for="url-input">URL</label>
                <input type="url" id="url-input" placeholder="https://example.com">
            </div>
            <div id="field-text" class="input-fields">
                <label for="text-input">Text Content</label>
                <textarea id="text-input" placeholder="Enter your text here..."></textarea>
            </div>
            <div id="field-email" class="input-fields">
                <label for="email-address">Email Address</label>
                <input type="email" id="email-address" placeholder="email@example.com">
                <label for="email-subject" style="margin-top: 10px;">Subject (optional)</label>
                <input type="text" id="email-subject" placeholder="Email subject">
                <label for="email-body" style="margin-top: 10px;">Body (optional)</label>
                <textarea id="email-body" placeholder="Email body"></textarea>
            </div>
            <div id="field-phone" class="input-fields">
                <label for="phone-input">Phone Number</label>
                <input type="tel" id="phone-input" placeholder="+1234567890">
            </div>
            <div id="field-sms" class="input-fields">
                <label for="sms-number">Phone Number</label>
                <input type="tel" id="sms-number" placeholder="+1234567890">
                <label for="sms-message" style="margin-top: 10px;">Message</label>
                <textarea id="sms-message" placeholder="SMS message"></textarea>
            </div>
            <div id="field-wifi" class="input-fields">
                <label for="wifi-ssid">Network Name (SSID)</label>
                <input type="text" id="wifi-ssid" placeholder="My WiFi Network">
                <label for="wifi-password" style="margin-top: 10px;">Password</label>
                <input type="text" id="wifi-password" placeholder="WiFi password">
                <label for="wifi-encryption" style="margin-top: 10px;">Encryption</label>
                <select id="wifi-encryption">
                    <option value="WPA">WPA/WPA2</option>
                    <option value="WEP">WEP</option>
                    <option value="nopass">None</option>
                </select>
            </div>
            <div id="field-vcard" class="input-fields">
                <label for="vcard-name">Full Name</label>
                <input type="text" id="vcard-name" placeholder="John Doe">
                <label for="vcard-phone" style="margin-top: 10px;">Phone</label>
                <input type="tel" id="vcard-phone" placeholder="+1234567890">
                <label for="vcard-email" style="margin-top: 10px;">Email</label>
                <input type="email" id="vcard-email" placeholder="email@example.com">
                <label for="vcard-org" style="margin-top: 10px;">Organization</label>
                <input type="text" id="vcard-org" placeholder="Company Name">
                <label for="vcard-url" style="margin-top: 10px;">Website</label>
                <input type="url" id="vcard-url" placeholder="https://example.com">
            </div>
        </div>

        <button class="generate-btn" onclick="generateQR()">Generate QR Code</button>

        <div class="result" id="result">
            <div id="qrcode"></div>
            <button class="download-btn" onclick="downloadQR()">Download QR Code</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let currentType = 'url';
        let qrCanvas = null;

        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentType = this.dataset.type;

                document.querySelectorAll('.input-fields').forEach(f => f.classList.remove('active'));
                document.getElementById('field-' + currentType).classList.add('active');

                document.getElementById('result').classList.remove('show');
            });
        });

        function getContent() {
            let content = '';
            switch(currentType) {
                case 'url':
                    content = document.getElementById('url-input').value.trim();
                    break;
                case 'text':
                    content = document.getElementById('text-input').value;
                    break;
                case 'email':
                    const email = document.getElementById('email-address').value.trim();
                    const subject = encodeURIComponent(document.getElementById('email-subject').value.trim());
                    const body = encodeURIComponent(document.getElementById('email-body').value);
                    if (subject || body) {
                        content = `mailto:${email}?subject=${subject}&body=${body}`;
                    } else {
                        content = `mailto:${email}`;
                    }
                    break;
                case 'phone':
                    content = 'tel:' + document.getElementById('phone-input').value.trim();
                    break;
                case 'sms':
                    const smsNum = document.getElementById('sms-number').value.trim();
                    const smsMsg = encodeURIComponent(document.getElementById('sms-message').value);
                    content = `sms:${smsNum}?body=${smsMsg}`;
                    break;
                case 'wifi':
                    const ssid = document.getElementById('wifi-ssid').value;
                    const password = document.getElementById('wifi-password').value;
                    const encryption = document.getElementById('wifi-encryption').value;
                    content = `WIFI:T:${encryption};S:${ssid};P:${password};;`;
                    break;
                case 'vcard':
                    const name = document.getElementById('vcard-name').value;
                    const phone = document.getElementById('vcard-phone').value.trim();
                    const vemail = document.getElementById('vcard-email').value.trim();
                    const org = document.getElementById('vcard-org').value;
                    const url = document.getElementById('vcard-url').value.trim();
                    content = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${phone}\nEMAIL:${vemail}\nORG:${org}\nURL:${url}\nEND:VCARD`;
                    break;
            }
            return content;
        }

        function generateQR() {
            const content = getContent();
            
            if (!content || (content.startsWith('mailto:') && !content.replace('mailto:', '').trim())) {
                alert('Please enter some content to generate a QR code');
                return;
            }

            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';

            new QRCode(qrContainer, {
                text: content,
                width: 250,
                height: 250,
                margin: 2,
                colorDark: '#000000',
                colorLight: '#ffffff'
            });

            qrCanvas = qrContainer.querySelector('canvas');
            if (!qrCanvas) {
                qrCanvas = qrContainer.querySelector('img');
            }
            document.getElementById('result').classList.add('show');
        }

        function downloadQR() {
            if (!qrCanvas) return;

            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = qrCanvas.toDataURL('image/png');
            link.click();
        }

        document.getElementById('url-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generateQR();
        });
    </script>
</body>
</html>
