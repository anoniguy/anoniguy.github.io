<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tippy.js Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p {
            color: #a0a0a0;
            margin-bottom: 3rem;
        }
        
        .tooltip-container {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .tooltip-btn {
            padding: 0.75rem 1.5rem;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .tooltip-btn:hover {
            background: #6366f1;
            border-color: #6366f1;
        }
        
        a {
            display: inline-block;
            margin-top: 3rem;
            padding: 0.75rem 1.5rem;
            background: #6366f1;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Tippy.js</h1>
    <p>Tooltips with Popper.js</p>
    
    <div class="tooltip-container">
        <button class="tooltip-btn" data-tooltip="Home page">Home</button>
        <button class="tooltip-btn" data-tooltip="Learn about me">About</button>
        <button class="tooltip-btn" data-tooltip="View my work">Projects</button>
        <button class="tooltip-btn" data-tooltip="Read my blog">Blog</button>
        <button class="tooltip-btn" data-tooltip="Get in touch">Contact</button>
    </div>
    
    <div class="tooltip-container" style="margin-top: 2rem;">
        <button class="tooltip-btn" data-tooltip="JavaScript framework">React</button>
        <button class="tooltip-btn" data-tooltip="Progressive framework">Vue</button>
        <button class="tooltip-btn" data-tooltip="Backend runtime">Node.js</button>
        <button class="tooltip-btn" data-tooltip="Python framework">Django</button>
    </div>
    
    <a href="index.html">Back to Portfolio</a>

    <!-- Popper.js first -->
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <!-- Then Tippy.js -->
    <script src="https://unpkg.com/tippy.js@6"></script>
    
    <script>
        // Initialize Tippy on all elements with data-tooltip attribute
        tippy('[data-tooltip]', {
            content: (reference) => reference.getAttribute('data-tooltip'),
            animation: 'shift-away',
            arrow: true,
            theme: 'dark'
        });
    </script>
</body>
</html>
