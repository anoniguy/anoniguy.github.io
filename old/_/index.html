<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>minecraft java edition server list</title>
</head>
<body>
    <input type="url" id="ipinput"><button onclick="submit()">SUBMIT</button>
    <div id="servers"></div>
    <script>
        function submit() {
            document.getElementById("servers").innerHTML += ("<div>"+document.getElementById("ipinput").value+"</div>")
        }
    </script>
</body>
</html>
