<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blog - mtleont">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" href="icon0.png" type="image/png">
    <title>Blog | mtleont</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="assets/styles.css">
    
    <style>
        .blog-page { padding-top: 120px; min-height: 100vh; padding-bottom: 4rem; }
        .blog-header { text-align: center; margin-bottom: 4rem; padding: 0 2rem; }
        .blog-header h1 { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .blog-header p { color: #a0a0a0; font-size: 1.1rem; }
        .blog-container { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
        .blog-post { background: #141414; border: 1px solid #2a2a2a; border-radius: 16px; padding: 2rem; margin-bottom: 2rem; cursor: pointer; transition: all 0.3s ease; }
        .blog-post:hover { border-color: #6366f1; transform: translateY(-4px); }
        .blog-post-title { font-size: 1.5rem; margin-bottom: 0.5rem; color: white; }
        .blog-post:hover .blog-post-title { color: #6366f1; }
        .blog-post-date { font-size: 0.85rem; color: #666; margin-bottom: 1rem; }
        .blog-post-excerpt { color: #a0a0a0; line-height: 1.7; }
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: #a0a0a0; margin-bottom: 2rem; text-decoration: none; transition: color 0.3s ease; }
        .back-link:hover { color: white; }
        .blog-placeholder { text-align: center; padding: 3rem; color: #666; }
        .blog-placeholder a { color: #6366f1; }
        .loading { text-align: center; color: #666; padding: 3rem; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <img src="pfp.jpg" alt="mtleont">
                <span>mtleont</span>
            </a>
            
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="blog.html" class="nav-link active">Blog</a></li>
                <li><a href="projects.html" class="nav-link">Projects</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
            </ul>
            
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Blog Content -->
    <main class="blog-page">
        <div class="blog-container">
            <a href="index.html" class="back-link">&larr; Back to Home</a>
            
            <header class="blog-header">
                <h1>Blog</h1>
                <p>Thoughts, tutorials, tips plus random stuff.</p>
            </header>
            
            <div id="blog-list">
                <div class="loading">Loading posts...</div>
            </div>
            
            <div class="blog-placeholder" id="blog-instructions" style="display: none;">
                <p>No blog posts yet.</p>
                <!-- <p style="margin-top: 1rem;">
                    Create your first post by opening a 
                    <a href="https://github.com/mtleont/mtleont.github.io/issues/new?labels=blog" target="_blank">GitHub Issue</a> 
                    with the label "blog"
                </p> -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p class="footer-text">&copy; 2026 mtleont <img src="weblogo.png" alt="logo" style="height: 40px; vertical-align: middle; margin-left: 8px;"></p>
                <div class="footer-links">
                    <a href="https://github.com/mtleont" class="footer-link" target="_blank" data-tooltip="GitHub">GitHub</a>
                    <a href="https://twitch.tv/ddeathtrain12" class="footer-link" target="_blank" data-tooltip="Twitch">Twitch</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Popper.js (required for Tippy) -->
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <!-- Tippy.js -->
    <script src="https://unpkg.com/tippy.js@6"></script>
    
    <script>
        // Configuration
        const GITHUB_USERNAME = 'mtleont';
        const GITHUB_REPO = 'mtleont.github.io';
        
        // Mobile Menu
        function initMobileMenu() {
            document.getElementById('menuToggle')?.addEventListener('click', () => {
                document.getElementById('navLinks')?.classList.toggle('active');
            });
        }
        
        // Tooltips
        function initTooltips() {
            if (typeof tippy !== 'undefined') {
                tippy('[data-tooltip]', {
                    content: (reference) => reference.getAttribute('data-tooltip'),
                    animation: 'shift-away',
                    arrow: true,
                    theme: 'dark'
                });
            }
        }
        
        // Fetch Blog Posts
        async function fetchBlogPosts() {
            const blogList = document.getElementById('blog-list');
            const blogInstructions = document.getElementById('blog-instructions');
            
            try {
                const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/issues?labels=blog&state=open&per_page=20`;
                
                const response = await fetch(apiUrl);
                
                if (!response.ok) throw new Error('Failed to fetch');
                
                const issues = await response.json();
                
                if (issues.length === 0) {
                    blogList.innerHTML = '';
                    blogInstructions.style.display = 'block';
                    return;
                }
                
                blogList.innerHTML = '';
                
                issues.forEach(issue => {
                    const article = document.createElement('article');
                    article.className = 'blog-post';
                    
                    const date = new Date(issue.created_at).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                    
                    let excerpt = '';
                    if (issue.body) {
                        const cleanBody = issue.body.replace(/^#.*$/gm, '').replace(/^##.*$/gm, '').trim();
                        excerpt = cleanBody.substring(0, 200);
                        if (issue.body.length > 200) excerpt += '...';
                    }
                    
                    article.innerHTML = `
                        <h2 class="blog-post-title">${escapeHtml(issue.title)}</h2>
                        <div class="blog-post-date">${date}</div>
                        <p class="blog-post-excerpt">${escapeHtml(excerpt) || 'Click to read more...'}</p>
                    `;
                    
                    article.addEventListener('click', () => window.open(issue.html_url, '_blank'));
                    blogList.appendChild(article);
                });
                
            } catch (error) {
                console.error('Error:', error);
                blogList.innerHTML = '';
                blogInstructions.style.display = 'block';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            initMobileMenu();
            initTooltips();
            fetchBlogPosts();
        });
    </script>
</body>
</html>
